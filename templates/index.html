<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benslab Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}

        :root {
            --bg:      #080d16;
            --bg2:     #0d1525;
            --card:    #111827;
            --card2:   #0f1d2e;
            --border:  #1f2d40;
            --border2: #273548;
            --magenta: #E20074;
            --mg-dim:  rgba(226,0,116,.12);
            --mg-glow: rgba(226,0,116,.30);
            --text:    #e2e8f0;
            --muted:   #64748b;
            --muted2:  #94a3b8;
            --green:   #22c55e;
            --yellow:  #f59e0b;
            --red:     #ef4444;
            --blue:    #3b82f6;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Header ───────────────────────────────────────────── */
        .header {
            background: var(--card);
            border-bottom: 2px solid var(--magenta);
            padding: .85rem 1.5rem;
            display: flex;
            align-items: center;
            gap: .9rem;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 4px 24px rgba(0,0,0,.5), 0 2px 0 var(--mg-dim);
            flex-wrap: wrap;
        }
        .header-logo { font-size: 1.6rem; line-height: 1; }
        h1.header-title {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -.02em;
        }
        h1.header-title span { color: var(--magenta); }
        .live-indicator {
            display: flex;
            align-items: center;
            gap: .4rem;
            font-size: .75rem;
            color: var(--muted2);
        }
        .live-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 8px rgba(34,197,94,.6);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.35} }

        .header-time {
            margin-left: auto;
            font-size: .78rem;
            color: var(--muted);
            font-variant-numeric: tabular-nums;
        }

        /* ── Summary Bar ──────────────────────────────────────── */
        .summary-bar {
            background: var(--card2);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            display: grid;
            grid-template-columns: 180px 1fr;
            gap: 1.2rem;
            align-items: center;
        }
        @media(max-width:600px){ .summary-bar { grid-template-columns:1fr; } }

        .summary-donut-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .summary-donut-wrap h2 {
            font-size: .65rem;
            text-transform: uppercase;
            letter-spacing: .12em;
            color: var(--muted);
            margin-bottom: .4rem;
        }
        #statusDonut { max-height: 120px; }

        .summary-stats {
            display: flex;
            flex-wrap: wrap;
            gap: .65rem;
            align-items: center;
        }
        .sum-pill {
            background: var(--card);
            border: 1px solid var(--border2);
            border-radius: .6rem;
            padding: .6rem 1.1rem;
            text-align: center;
            min-width: 88px;
            transition: border-color .2s;
        }
        .sum-pill .val {
            font-size: 1.9rem;
            font-weight: 800;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }
        .sum-pill .lbl {
            font-size: .6rem;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--muted);
            margin-top: .2rem;
        }
        .sum-pill.has-warning { border-color: rgba(239,68,68,.4); }

        /* ── Page Content ─────────────────────────────────────── */
        .page-content {
            padding: 1rem 1.5rem 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        @media(max-width:480px){ .page-content { padding: .75rem 1rem 2rem; } }

        /* ── Layer Section ────────────────────────────────────── */
        .layer-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: .75rem;
            overflow: hidden;
        }
        .layer-header {
            display: flex;
            align-items: center;
            gap: .5rem;
            padding: .6rem 1.1rem;
            background: var(--mg-dim);
            border-bottom: 1px solid rgba(226,0,116,.18);
            font-size: .7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .12em;
            color: var(--magenta);
        }
        .layer-counts {
            margin-left: auto;
            display: flex;
            gap: .35rem;
        }
        .lc-up, .lc-dn {
            font-size: .62rem;
            font-weight: 700;
            padding: .12rem .5rem;
            border-radius: 9999px;
        }
        .lc-up { background: rgba(34,197,94,.12); color: var(--green); }
        .lc-dn { background: rgba(239,68,68,.15); color: var(--red); }

        /* ── Device Grid ──────────────────────────────────────── */
        .device-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 1px;
            background: var(--border);
        }

        /* ── Device Card ──────────────────────────────────────── */
        .device-card {
            background: var(--card);
            padding: .85rem 1rem;
            transition: background .15s;
            position: relative;
        }
        .device-card.clickable { cursor: pointer; }
        .device-card.clickable:hover { background: #19263a; }
        .device-card.is-down {
            background: rgba(239,68,68,.04);
            outline: 1px solid rgba(239,68,68,.22);
            outline-offset: -1px;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: .45rem;
            margin-bottom: .3rem;
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--border2);
            transition: background .3s, box-shadow .3s;
        }
        .status-dot.up   { background: var(--green); box-shadow: 0 0 7px rgba(34,197,94,.6); }
        .status-dot.down { background: var(--red);   box-shadow: 0 0 7px rgba(239,68,68,.6); animation: blink 1.2s infinite; }
        @keyframes blink { 0%,100%{opacity:1}50%{opacity:.2} }

        .device-name {
            font-weight: 700;
            font-size: .85rem;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .device-type-badge {
            font-size: .55rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--muted);
            background: var(--bg2);
            border: 1px solid var(--border);
            padding: .1rem .35rem;
            border-radius: .25rem;
            flex-shrink: 0;
        }
        .device-ip {
            font-size: .68rem;
            color: var(--muted);
            margin-bottom: .6rem;
            font-variant-numeric: tabular-nums;
        }

        /* ── SVG Arc Gauge (card) ─────────────────────────────── */
        .metrics-row {
            display: flex;
            align-items: flex-start;
            gap: .6rem;
        }
        .gauge-wrap {
            flex-shrink: 0;
            width: 56px;
            text-align: center;
        }
        .gauge-wrap svg {
            display: block;
            width: 56px;
            height: 32px;
        }
        .gauge-val {
            font-size: .72rem;
            font-weight: 800;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }
        .gauge-lbl {
            font-size: .55rem;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: var(--muted);
        }
        .metrics-right { flex: 1; min-width: 0; }

        .mini-bar {
            display: flex;
            align-items: center;
            gap: .3rem;
            margin-bottom: .28rem;
        }
        .mini-bar-lbl {
            font-size: .6rem;
            color: var(--muted);
            width: 28px;
            flex-shrink: 0;
        }
        .mini-bar-track {
            flex: 1;
            height: 5px;
            background: rgba(255,255,255,.07);
            border-radius: 9999px;
            overflow: hidden;
        }
        .mini-bar-fill {
            height: 100%;
            border-radius: 9999px;
            transition: width .7s ease;
        }
        .mini-bar-pct {
            font-size: .6rem;
            color: var(--muted2);
            width: 26px;
            text-align: right;
            flex-shrink: 0;
            font-variant-numeric: tabular-nums;
        }
        .f-ok   { background: var(--green); }
        .f-warn { background: var(--yellow); }
        .f-crit { background: var(--red); }

        .fw-states {
            font-size: .6rem;
            color: var(--muted);
            margin-top: .1rem;
            font-variant-numeric: tabular-nums;
        }

        /* Ping row */
        .ping-row {
            display: flex;
            align-items: center;
            gap: .35rem;
            margin-top: .55rem;
        }
        .ping-led {
            width: 6px; height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--border2);
        }
        .ping-led.ok   { background: var(--green); }
        .ping-led.warn { background: var(--yellow); }
        .ping-led.bad  { background: var(--red); animation: blink 1.2s infinite; }
        .ping-ms { font-size: .68rem; color: var(--muted2); font-variant-numeric: tabular-nums; }

        /* EoIP strip */
        .eoip-strip {
            display: flex;
            gap: .55rem;
            margin-top: .55rem;
            padding-top: .5rem;
            border-top: 1px solid rgba(255,255,255,.06);
        }
        .eoip-item {
            display: flex;
            align-items: center;
            gap: .25rem;
            font-size: .6rem;
            color: var(--muted);
        }
        .eoip-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: rgba(255,255,255,.12);
            flex-shrink: 0;
        }
        .eoip-dot.up   { background: var(--green); box-shadow: 0 0 5px rgba(34,197,94,.6); }
        .eoip-dot.down { background: var(--red);   box-shadow: 0 0 5px rgba(239,68,68,.6); }

        /* ── Alert Banner ─────────────────────────────────────── */
        #alertBanner {
            display: none;
            position: fixed;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            width: min(620px, 94vw);
            background: rgba(100,0,20,.88);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(239,68,68,.45);
            border-radius: .65rem;
            padding: .75rem 1.2rem;
            z-index: 60;
            box-shadow: 0 8px 32px rgba(0,0,0,.6), 0 0 20px rgba(239,68,68,.12);
        }
        .alert-item {
            color: #fca5a5;
            font-size: .82rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: .5rem;
            margin: .15rem 0;
        }
        .alert-item::before {
            content: '';
            width: 6px; height: 6px;
            background: var(--red);
            border-radius: 50%;
            flex-shrink: 0;
            animation: blink 1s infinite;
        }

        /* ── Modal ────────────────────────────────────────────── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.78);
            backdrop-filter: blur(12px);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .modal-overlay.active { display: flex; }

        .modal-content {
            background: var(--card);
            border: 1px solid var(--border2);
            border-top: 2px solid var(--magenta);
            border-radius: .75rem;
            width: min(560px, 100%);
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(0,0,0,.75), 0 0 30px var(--mg-dim);
        }
        .modal-header {
            display: flex;
            align-items: center;
            gap: .7rem;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .modal-header h2 {
            font-size: 1.05rem;
            font-weight: 700;
            flex: 1;
        }
        .close-btn {
            width: 28px; height: 28px;
            background: rgba(255,255,255,.05);
            border: 1px solid var(--border);
            border-radius: .4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted2);
            font-size: .9rem;
            transition: all .15s;
        }
        .close-btn:hover { background: rgba(239,68,68,.18); color: var(--red); border-color: rgba(239,68,68,.35); }

        /* Modal gauges */
        .modal-gauges {
            display: flex;
            gap: 1.5rem;
            padding: .9rem 1.25rem;
            border-bottom: 1px solid var(--border);
            justify-content: center;
            flex-wrap: wrap;
            background: var(--bg2);
            flex-shrink: 0;
        }
        .modal-gauge-item { text-align: center; }
        .modal-gauge-item canvas { display: block; margin: 0 auto; }
        .modal-gauge-val {
            font-size: 1.1rem;
            font-weight: 800;
            margin-top: .1rem;
            font-variant-numeric: tabular-nums;
        }
        .modal-gauge-lbl {
            font-size: .62rem;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--muted);
        }
        .modal-gauge-sub {
            font-size: .6rem;
            color: var(--muted);
            margin-top: .1rem;
            font-variant-numeric: tabular-nums;
        }

        /* Tabs */
        .modal-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .tab-btn {
            padding: .55rem 1.1rem;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--muted2);
            font-size: .72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .09em;
            cursor: pointer;
            transition: all .15s;
            margin-bottom: -1px;
        }
        .tab-btn.active  { color: var(--magenta); border-bottom-color: var(--magenta); }
        .tab-btn:hover:not(.active) { color: var(--text); }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: .75rem 1.25rem 1.25rem;
        }
        .modal-body::-webkit-scrollbar { width: 5px; }
        .modal-body::-webkit-scrollbar-track { background: transparent; }
        .modal-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

        .section-title {
            font-size: .65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .12em;
            color: var(--magenta);
            margin: 1rem 0 .45rem;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: .42rem .75rem;
            background: rgba(255,255,255,.03);
            border: 1px solid rgba(255,255,255,.06);
            border-radius: .45rem;
            margin-bottom: .35rem;
            font-size: .8rem;
        }
        .info-label { color: var(--muted2); }
        .info-value { font-weight: 600; }

        .progress-row {
            padding: .42rem .75rem;
            background: rgba(255,255,255,.03);
            border: 1px solid rgba(255,255,255,.06);
            border-radius: .45rem;
            margin-bottom: .35rem;
        }
        .progress-top {
            display: flex;
            justify-content: space-between;
            font-size: .78rem;
            margin-bottom: .28rem;
        }
        .progress-track {
            height: 6px;
            background: rgba(255,255,255,.07);
            border-radius: 9999px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 9999px;
            transition: width .7s ease;
        }

        .tunnel-row {
            display: flex;
            align-items: center;
            gap: .55rem;
            padding: .4rem .75rem;
            background: rgba(255,255,255,.03);
            border: 1px solid rgba(255,255,255,.06);
            border-radius: .45rem;
            margin-bottom: .35rem;
            font-size: .78rem;
        }
        .tunnel-led {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .tunnel-led.up   { background: var(--green); box-shadow: 0 0 5px rgba(34,197,94,.55); }
        .tunnel-led.warn { background: var(--yellow); }
        .tunnel-led.down { background: var(--red);   box-shadow: 0 0 5px rgba(239,68,68,.55); }
        .tunnel-name { flex: 1; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tunnel-ep   { color: var(--muted); font-size: .7rem; white-space: nowrap; }

        .user-row {
            display: flex;
            align-items: center;
            gap: .5rem;
            padding: .42rem .75rem;
            background: rgba(255,255,255,.03);
            border: 1px solid rgba(255,255,255,.06);
            border-radius: .45rem;
            margin-bottom: .35rem;
            font-size: .8rem;
        }
        .user-name  { font-weight: 700; flex: 1; }
        .user-group {
            font-size: .65rem;
            background: rgba(255,255,255,.06);
            padding: .1rem .4rem;
            border-radius: .3rem;
            color: var(--muted2);
        }
        .badge-key-yes {
            font-size: .65rem; font-weight: 700;
            color: var(--green);
            background: rgba(34,197,94,.1);
            border: 1px solid rgba(34,197,94,.25);
            padding: .1rem .4rem; border-radius: .3rem;
        }
        .badge-key-no {
            font-size: .65rem;
            color: var(--muted);
            background: rgba(255,255,255,.04);
            border: 1px solid rgba(255,255,255,.08);
            padding: .1rem .4rem; border-radius: .3rem;
        }
        .api-error {
            color: #fca5a5;
            background: rgba(239,68,68,.1);
            border: 1px solid rgba(239,68,68,.25);
            border-radius: .45rem;
            padding: .55rem .75rem;
            font-size: .78rem; font-weight: 600;
            margin-bottom: .35rem;
        }
        .loading-hint {
            color: var(--muted);
            font-size: .8rem;
            text-align: center;
            padding: 1.5rem 0;
        }

        /* ── OPNsense Topology View ───────────────────────────── */
        .topo-view {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 0;
        }
        .topo-layer {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: .6rem 0;
        }
        .topo-layer-label {
            font-size: .68rem;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--muted);
            margin-bottom: .5rem;
            font-weight: 600;
        }
        .topo-nodes {
            display: flex;
            flex-wrap: wrap;
            gap: .4rem;
            justify-content: center;
        }
        .topo-node {
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: .3rem .6rem;
            font-size: .75rem;
            display: flex;
            align-items: center;
            gap: .35rem;
            white-space: nowrap;
        }
        .topo-node.up   { border-color: rgba(34,197,94,.35); }
        .topo-node.down { border-color: rgba(239,68,68,.35); }
        .topo-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .topo-dot.up      { background: var(--green); box-shadow: 0 0 5px rgba(34,197,94,.6); }
        .topo-dot.down    { background: var(--red);   box-shadow: 0 0 5px rgba(239,68,68,.6); }
        .topo-dot.pending { background: var(--muted); }
        .topo-connector {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .topo-vline {
            width: 2px;
            height: 18px;
            background: linear-gradient(to bottom, var(--border2), var(--border));
        }
        .topo-center-card {
            background: var(--card2);
            border: 1px solid var(--magenta);
            border-radius: 12px;
            padding: .75rem 1rem;
            box-shadow: 0 0 18px var(--mg-dim);
        }
        .topo-ifaces-toggle {
            margin-top: .5rem;
            font-size: .72rem;
            color: var(--muted2);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: .3rem;
            user-select: none;
        }
        .topo-ifaces-toggle:hover { color: var(--text); }
        .topo-ifaces-body { margin-top: .4rem; }
        .topo-ep {
            color: var(--muted);
            font-size: .68rem;
            max-width: 9rem;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── Responsive ───────────────────────────────────────── */
        @media(max-width:480px) {
            .header { padding: .65rem 1rem; }
            .summary-bar { padding: .75rem 1rem; }
            .device-grid { grid-template-columns: 1fr 1fr; }
            h1.header-title { font-size: 1rem; }
        }
        @media(max-width:360px) {
            .device-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────── -->
<div class="header">
    <span class="header-logo">🦈</span>
    <h1 class="header-title">Bens<span>lab</span> Monitor</h1>
    <div class="live-indicator">
        <div class="live-dot"></div>
        Live
    </div>
    <span class="header-time" id="headerTime">–</span>
</div>

<!-- ── Summary Bar ─────────────────────────────────────────────── -->
<div class="summary-bar">
    <div class="summary-donut-wrap">
        <h2>Geräte Status</h2>
        <canvas id="statusDonut"></canvas>
    </div>
    <div class="summary-stats">
        <div class="sum-pill">
            <div class="val" id="sum-total">–</div>
            <div class="lbl">Gesamt</div>
        </div>
        <div class="sum-pill">
            <div class="val" style="color:var(--green)" id="sum-up">–</div>
            <div class="lbl">Online</div>
        </div>

</div>

                <span class="lc-dn" id="cnt-mid-dn" style="display:none">– offline</span>

    <div class="layer-section">
        <div class="layer-header">

                <span class="lc-up" id="cnt-bot-up">– online</span>

            </div>

                <span class="lc-dn" id="cnt-proc-dn" style="display:none">– offline</span>

<!-- ── Alert Banner ────────────────────────────────────────────── -->
<div id="alertBanner"></div>

<!-- ── Detail Modal ────────────────────────────────────────────── -->
<div id="detailModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span class="status-dot" id="modalDot"></span>
            <h2 id="modalTitle">–</h2>
            <div class="close-btn" onclick="closeModal()">✕</div>
        </div>
        <div id="modalBody" class="modal-body"></div>
    </div>
</div>

<script>
const config = {{ config|tojson }};

let deviceStatus = {};
let detailsData  = {};
let pingData     = {};
const natcoIds   = new Set(config.devices.bottom_layer.map(d => d.id));
const allDevices = [
    ...config.devices.top_layer,
    ...config.devices.middle_layer,
    ...config.devices.bottom_layer,
    ...config.devices.processing_layer,
];

// ── Zeit ───────────────────────────────────────────────────────
function updateTime() {
    const n = new Date();
    document.getElementById('headerTime').textContent =
        n.toLocaleDateString('de-DE', {weekday:'short',day:'numeric',month:'short',year:'numeric'})
        + '  ·  ' + n.toLocaleTimeString('de-DE');
}
setInterval(updateTime, 1000);
updateTime();

// ── Farbhilfen ─────────────────────────────────────────────────
function gaugeColor(pct) {
    if (pct >= 85) return '#ef4444';
    if (pct >= 60) return '#f59e0b';
    return '#22c55e';
}
function fillClass(pct) {
    if (pct >= 85) return 'f-crit';
    if (pct >= 60) return 'f-warn';
    return 'f-ok';
}
function progressClass(pct) {
    if (pct >= 85) return 'f-crit';
    if (pct >= 60) return 'f-warn';
    return 'f-ok';
}

// ── SVG-Halbkreistacho ─────────────────────────────────────────
// Halbkreis von links (180°) nach rechts (360°) durch oben (270°)
// sweep=0 = gegenuhrzeigersinn in SVG = visuell durch oben ✓
function makeGaugeSvg(pct, color) {
    const cx = 28, cy = 30, r = 22;
    const sx = cx - r, sy = cy;   // Startpunkt links (6, 30)
    const ex = cx + r;             // Endpunkt rechts  (50, 30)

    let fillPath = '';
    if (pct > 0 && pct <= 100) {
        const angle = Math.PI + (pct / 100) * Math.PI;
        const x2 = (cx + r * Math.cos(angle)).toFixed(2);
        const y2 = (cy + r * Math.sin(angle)).toFixed(2);
        const la  = pct >= 100 ? 1 : 0;   // large-arc: nur bei 100% nötig
        fillPath = `<path d="M ${sx} ${sy} A ${r} ${r} 0 ${la} 0 ${x2} ${y2}"
            fill="none" stroke="${color}" stroke-width="5.5" stroke-linecap="round"/>`;
    }

    return `<svg viewBox="0 0 56 32" xmlns="http://www.w3.org/2000/svg">
        <path d="M ${sx} ${sy} A ${r} ${r} 0 0 0 ${ex} ${sy}"
              fill="none" stroke="rgba(255,255,255,.08)" stroke-width="5.5" stroke-linecap="round"/>
        ${fillPath}
    </svg>`;
}

// ── Summary Donut ──────────────────────────────────────────────
const statusDonut = new Chart(
    document.getElementById('statusDonut').getContext('2d'), {
    type: 'doughnut',
    data: {
        labels: ['Online', 'Offline'],
        datasets: [{ data: [0, 0],
            backgroundColor: ['#22c55e', '#ef4444'],
            borderWidth: 2, borderColor: '#111827' }]
    },
    options: {
        responsive: true, maintainAspectRatio: false,
        cutout: '70%',
        plugins: {
            legend: { position: 'right',
                labels: { color: '#94a3b8', font: { size: 11 }, padding: 10, boxWidth: 10 } }
        }
    }
});

// ── Device-Karten erstellen ────────────────────────────────────
function initCards() {
    config.devices.top_layer       .forEach(d => createCard(d, 'grid-top',  false));
    config.devices.middle_layer    .forEach(d => createCard(d, 'grid-mid',  false));
    config.devices.bottom_layer    .forEach(d => createCard(d, 'grid-bot',  true));
    config.devices.processing_layer.forEach(d => createCard(d, 'grid-proc', false));
}

function typeBadge(t) {
    if (t === 'mikrotik')  return '<span class="device-type-badge">MikroTik</span>';
    if (t === 'opnsense')  return '<span class="device-type-badge">OPNsense</span>';
    return '';
}

function createCard(dev, gridId, isBottom) {
    if (document.getElementById('card-' + dev.id)) return;
    const grid = document.getElementById(gridId);
    const card = document.createElement('div');
    card.id = 'card-' + dev.id;
    card.className = 'device-card';
    if (dev.type && dev.type !== 'none') {
        card.classList.add('clickable');
        card.addEventListener('click', () => openModal(dev.id));
    }
    const eoip = isBottom ? `
        <div class="eoip-strip">
            <div class="eoip-item"><span class="eoip-dot" id="ep-${dev.id}"></span>Prod</div>
            <div class="eoip-item"><span class="eoip-dot" id="ee-${dev.id}"></span>Pre</div>
            <div class="eoip-item">
                <span class="ping-led" id="pled-${dev.id}"></span>
                <span class="ping-ms"  id="pms-${dev.id}">—</span>
            </div>
        </div>` : '';

    card.innerHTML = `
        <div class="card-header">
            <span class="status-dot" id="dot-${dev.id}"></span>
            <span class="device-name">${dev.name}</span>
            ${typeBadge(dev.type)}
        </div>
        <div class="device-ip">${dev.ip}</div>
        <div id="met-${dev.id}"></div>
        ${eoip}`;
    grid.appendChild(card);
}

// ── Karten-Metriken aktualisieren ─────────────────────────────
function updateCardMetrics(devId) {
    const el = document.getElementById('met-' + devId);
    if (!el) return;
    const d = detailsData[devId];
    if (!d || d.cpu === null || d.cpu === undefined) { el.innerHTML = ''; return; }

    const cpuColor = gaugeColor(d.cpu);
    const ram = d.ram_used_pct ?? 0;
    const fwHtml = (d.fw_states !== null && d.fw_states !== undefined)
        ? `<div class="fw-states">States: ${Number(d.fw_states).toLocaleString('de')}</div>` : '';

    el.innerHTML = `
        <div class="metrics-row">
            <div class="gauge-wrap">
                ${makeGaugeSvg(d.cpu, cpuColor)}
                <div class="gauge-val" style="color:${cpuColor}">${d.cpu}%</div>
                <div class="gauge-lbl">CPU</div>
            </div>
            <div class="metrics-right">
                <div class="mini-bar">
                    <span class="mini-bar-lbl">RAM</span>
                    <div class="mini-bar-track">
                        <div class="mini-bar-fill ${fillClass(ram)}" style="width:${ram}%"></div>
                    </div>
                    <span class="mini-bar-pct">${ram}%</span>
                </div>
                ${fwHtml}
            </div>
        </div>`;
}

// ── Karten-Status aktualisieren ────────────────────────────────
function updateCardStatus(devId) {
    const dot  = document.getElementById('dot-' + devId);
    const card = document.getElementById('card-' + devId);
    if (!dot || !card) return;
    const st = deviceStatus[devId] || 'pending';
    dot.className = 'status-dot ' + st;
    if (st === 'down') card.classList.add('is-down');
    else               card.classList.remove('is-down');
}

// ── Layer-Zähler aktualisieren ─────────────────────────────────
function updateLayerCounts() {
    const layers = [
        { devs: config.devices.top_layer,         up: 'cnt-top-up',  dn: 'cnt-top-dn'  },
        { devs: config.devices.middle_layer,       up: 'cnt-mid-up',  dn: 'cnt-mid-dn'  },
        { devs: config.devices.bottom_layer,       up: 'cnt-bot-up',  dn: 'cnt-bot-dn'  },
        { devs: config.devices.processing_layer,   up: 'cnt-proc-up', dn: 'cnt-proc-dn' },
    ];
    let totalUp = 0, totalDn = 0;
    layers.forEach(l => {
        const up = l.devs.filter(d => deviceStatus[d.id] === 'up').length;
        const dn = l.devs.filter(d => deviceStatus[d.id] === 'down').length;
        totalUp += up; totalDn += dn;
        const upEl = document.getElementById(l.up);
        const dnEl = document.getElementById(l.dn);
        if (upEl) upEl.textContent = `${up} online`;
        if (dnEl) { dnEl.textContent = `${dn} offline`; dnEl.style.display = dn > 0 ? '' : 'none'; }
    });
    document.getElementById('sum-total').textContent = totalUp + totalDn || '–';
    document.getElementById('sum-up').textContent    = totalUp;
    document.getElementById('sum-down').textContent  = totalDn;
    const pill = document.getElementById('sum-down-pill');
    if (pill) pill.classList.toggle('has-warning', totalDn > 0);
    statusDonut.data.datasets[0].data = [totalUp, totalDn];
    statusDonut.update('none');
}

// ── Ping-Tile aktualisieren (Sites) ───────────────────────────
function updatePingTile(devId) {
    const pd  = pingData[devId];
    const led = document.getElementById(`pled-${devId}`);
    const ms  = document.getElementById(`pms-${devId}`);
    if (!led || !ms) return;
    const p = pd && pd.primary;
    let cls = '';
    if (p && p.reachable && p.latency !== null) {
        cls = p.latency <= 30 ? 'ok' : p.latency <= 100 ? 'warn' : 'bad';
    } else if (p && !p.reachable) {
        cls = 'bad';
    }
    led.className = 'ping-led ' + cls;
    ms.textContent = (p && p.reachable && p.latency !== null)
        ? p.latency + 'ms' : (p ? 'off' : '—');
}

// ── EoIP-LEDs aktualisieren ────────────────────────────────────
function updateNodeEoip(devId) {
    const d   = detailsData[devId];
    const pdot = document.getElementById(`ep-${devId}`);
    const edot = document.getElementById(`ee-${devId}`);
    if (!pdot || !edot) return;
    let ps = null, es = null;
    if (d && d.eoip && d.eoip.length > 0) {
        d.eoip.forEach(t => {
            const nm = t.name.toLowerCase();
            if (nm.includes('preprod') || nm.includes('pre-prod') || nm.includes('pre_prod'))
                es = t.status;
            else if (nm.includes('prod'))
                ps = t.status;
        });
        if (!ps && !es) { ps = d.eoip[0]?.status ?? null; es = d.eoip[1]?.status ?? null; }
    }
    pdot.className = 'eoip-dot' + (ps ? ' ' + ps : '');
    edot.className = 'eoip-dot' + (es ? ' ' + es : '');
}

// ── Status-Polling ─────────────────────────────────────────────
async function updateStatus() {
    try {
        deviceStatus = await (await fetch('/api/status')).json();
        const downList = [];
        for (const [id, st] of Object.entries(deviceStatus)) {
            updateCardStatus(id);
            if (st === 'down') {
                const dev = allDevices.find(d => d.id === id);
                if (dev) downList.push(dev.name);
            }
        }
        updateLayerCounts();
        const banner = document.getElementById('alertBanner');
        if (downList.length > 0) {
            banner.style.display = 'block';
            banner.innerHTML = downList.map(n =>
                `<div class="alert-item">${n} nicht erreichbar</div>`).join('');
        } else {
            banner.style.display = 'none';
        }
    } catch(e) { console.warn('Status-Fehler', e); }
}
setInterval(updateStatus, 5000);
updateStatus();

// ── Details-Polling ────────────────────────────────────────────
async function refreshDetails() {
    try {
        detailsData = await (await fetch('/api/details')).json();
        allDevices.forEach(d => updateCardMetrics(d.id));
        config.devices.bottom_layer.forEach(d => updateNodeEoip(d.id));
    } catch(e) { console.warn('Details-Fehler', e); }
}
setInterval(refreshDetails, 30000);
refreshDetails();

// ── Ping-Polling ───────────────────────────────────────────────
async function refreshPing() {
    try {
        pingData = await (await fetch('/api/ping')).json();
        config.devices.bottom_layer.forEach(d => updatePingTile(d.id));
    } catch(e) { console.warn('Ping-Fehler', e); }
}
setInterval(refreshPing, 5000);
refreshPing();

// ── Modal-Hilfs-Funktionen ─────────────────────────────────────
function infoRow(lbl, val) {
    return `<div class="info-row">
        <span class="info-label">${lbl}</span>
        <span class="info-value">${val}</span>
    </div>`;
}
function progressRow(lbl, pct) {
    return `<div class="progress-row">
        <div class="progress-top">
            <span class="info-label">${lbl}</span>
            <span class="info-value">${pct}%</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill ${progressClass(pct)}" style="width:${pct}%"></div>
        </div>
    </div>`;
}
function ramRow(d) {
    return `<div class="progress-row">
        <div class="progress-top">
            <span class="info-label">RAM</span>
            <span class="info-value">${d.ram_used_pct}%
                <span style="font-weight:400;font-size:.7rem;color:var(--muted)">
                    (${d.ram_free_mb} MB frei / ${d.ram_total_mb} MB)
                </span>
            </span>
        </div>
        <div class="progress-track">
            <div class="progress-fill ${progressClass(d.ram_used_pct)}" style="width:${d.ram_used_pct}%"></div>
        </div>
    </div>`;
}
function tunnelRow(item, remoteKey) {
    return `<div class="tunnel-row">
        <span class="tunnel-led ${item.status}"></span>
        <span class="tunnel-name">${item.name}</span>
        <span class="tunnel-ep">${item[remoteKey] || '—'}</span>
    </div>`;
}
function interfaceRow(iface) {
    const lbl = iface.comment
        ? `${iface.name} <span style="opacity:.45;font-weight:400">${iface.comment}</span>`
        : iface.name;
    return `<div class="tunnel-row">
        <span class="tunnel-led ${iface.status}"></span>
        <span class="tunnel-name">${lbl}</span>
        <span class="tunnel-ep">${iface.status === 'up' ? iface.speed : '—'}</span>
    </div>`;
}
function systemSection(d) {
    let h = `<div class="section-title">System</div>`;
    if (d.uptime) h += infoRow('Uptime', d.uptime);
    if (d.cpu !== null && d.cpu !== undefined) h += progressRow('CPU', d.cpu);
    if (d.ram_used_pct !== null && d.ram_used_pct !== undefined) h += ramRow(d);
    if (d.fw_states !== null && d.fw_states !== undefined) {
        const lim = d.fw_limit ? ` / ${Number(d.fw_limit).toLocaleString('de')} max` : '';
        h += infoRow('Firewall States', `${Number(d.fw_states).toLocaleString('de')}${lim}`);
    }
    if (d.loadavg) h += infoRow('Load Avg', d.loadavg);
    return h;
}
function interfacesSection(ifaces) {
    if (!ifaces?.length) return '';
    let h = `<div class="section-title">Interfaces</div>`;
    ifaces.forEach(i => { h += interfaceRow(i); });
    return h;
}
function pingSection(devId) {
    const pd = pingData[devId];
    let h = `<div class="section-title">Ping (WireGuard Tunnel)</div>`;
    if (!pd) { h += `<div class="loading-hint">Ping-Daten werden geladen…</div>`; return h; }
    const makeRow = (lbl, info) => {
        if (!info) return '';
        let cls = 'down';
        if (info.reachable && info.latency !== null)
            cls = info.latency <= 30 ? 'up' : info.latency <= 100 ? 'warn' : 'down';
        const msHtml = (info.reachable && info.latency !== null)
            ? `<strong style="color:var(--text)">${info.latency} ms</strong>`
            : `<strong style="color:var(--red)">nicht erreichbar</strong>`;
        return `<div class="tunnel-row">
            <span class="tunnel-led ${cls}"></span>
            <span class="tunnel-name">${lbl}</span>
            <span class="tunnel-ep">${info.ip}&nbsp;&nbsp;${msHtml}</span>
        </div>`;
    };
    h += makeRow('10.20.x.x (primär)', pd.primary);
    h += makeRow('10.10.x.x (alternativ)', pd.alt);
    return h;
}
function usersSection(d) {
    if (!d) return `<div class="loading-hint">Details werden geladen…</div>`;
    if (!d.users?.length) return `<div class="loading-hint">Keine Benutzerdaten verfügbar.</div>`;
    let h = `<div class="section-title">Benutzer (${d.users.length})</div>`;
    d.users.forEach(u => {
        const keyBadge = u.has_ssh_key
            ? `<span class="badge-key-yes">🔑 Key</span>`
            : `<span class="badge-key-no">kein Key</span>`;
        h += `<div class="user-row">
            <span class="user-name">${u.name}</span>
            <span class="user-group">${u.group || '—'}</span>
            ${keyBadge}
        </div>`;
    });
    return h;
}

// ── Tab-System ─────────────────────────────────────────────────
function switchTab(btn, tabId) {
    document.querySelectorAll('#modalBody .tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('#modalBody .tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('mtab-' + tabId)?.classList.add('active');
}
function buildTabbedModal(tabs) {
    return `<div class="modal-tabs">${tabs.map((t,i) =>
        `<button class="tab-btn ${i===0?'active':''}" onclick="switchTab(this,'${t.id}')">${t.label}</button>`
    ).join('')}</div>${tabs.map((t,i) =>
        `<div class="tab-pane ${i===0?'active':''}" id="mtab-${t.id}">${t.content}</div>`
    ).join('')}`;
}

// ── Modal-Gauges (Chart.js Halbkreis) ─────────────────────────
let _cpuChart = null, _ramChart = null;
function destroyModalCharts() {
    if (_cpuChart) { _cpuChart.destroy(); _cpuChart = null; }
    if (_ramChart) { _ramChart.destroy(); _ramChart = null; }
}
function makeHalfGauge(canvasId, pct, color) {
    const el = document.getElementById(canvasId);
    if (!el) return null;
    return new Chart(el.getContext('2d'), {
        type: 'doughnut',
        data: { datasets: [{
            data: [pct, 100 - pct],
            backgroundColor: [color, 'rgba(255,255,255,.07)'],
            borderWidth: 0,
        }]},
        options: {
            responsive: false,
            cutout: '74%',
            rotation: -90,
            circumference: 180,
            plugins: { legend: { display: false }, tooltip: { enabled: false } }
        }
    });
}

// ── Modal öffnen ───────────────────────────────────────────────
function openModal(devId) {
    const dev = allDevices.find(d => d.id === devId);
    if (!dev || dev.type === 'none') return;
    destroyModalCharts();

    const st = deviceStatus[devId] || 'pending';
    document.getElementById('modalTitle').textContent = dev.name;
    document.getElementById('modalDot').className = 'status-dot ' + st;

    const d = detailsData[devId];
    const isNatco = natcoIds.has(devId);

    const headerHtml = infoRow('IP-Adresse', dev.ip)
        + infoRow('Status', `<span style="color:${st==='up'?'var(--green)':'var(--red)'};font-weight:700">${st.toUpperCase()}</span>`);

    // Gauge-Sektion (oben im Modal)
    let gaugeHtml = '';
    if (d && d.cpu !== null && d.cpu !== undefined && d.ram_used_pct !== null) {
        const sub = d.ram_free_mb !== null
            ? `<div class="modal-gauge-sub">${d.ram_free_mb} MB frei</div>` : '';
        gaugeHtml = `<div class="modal-gauges">
            <div class="modal-gauge-item">
                <canvas id="mc-cpu" width="110" height="62"></canvas>
                <div class="modal-gauge-val" style="color:${gaugeColor(d.cpu)}">${d.cpu}%</div>
                <div class="modal-gauge-lbl">CPU</div>
            </div>
            <div class="modal-gauge-item">
                <canvas id="mc-ram" width="110" height="62"></canvas>
                <div class="modal-gauge-val" style="color:${gaugeColor(d.ram_used_pct)}">${d.ram_used_pct}%</div>
                <div class="modal-gauge-lbl">RAM</div>
                ${sub}
            </div>
        </div>`;
    }

    const bodyEl = document.getElementById('modalBody');

    if (dev.type === 'mikrotik') {
        let detailsHtml = headerHtml;
        if (!d) {
            detailsHtml += `<div class="loading-hint">Details werden geladen…</div>`;
        } else if (d.error && d.cpu === null) {
            detailsHtml += `<div class="api-error">Fehler: ${d.error}</div>`;
        } else {
            detailsHtml += systemSection(d);
            if (isNatco) detailsHtml += pingSection(devId);
            detailsHtml += interfacesSection(d.interfaces);
            if (d.wireguard?.length) {
                detailsHtml += `<div class="section-title">WireGuard Peers</div>`;
                d.wireguard.forEach(p => { detailsHtml += tunnelRow(p, 'endpoint'); });
            }
            if (d.eoip?.length) {
                detailsHtml += `<div class="section-title">EoIP Tunnel</div>`;
                d.eoip.forEach(t => { detailsHtml += tunnelRow(t, 'remote'); });
            }
            if (d.error) detailsHtml += `<div class="api-error" style="margin-top:.5rem">Teilfehler: ${d.error}</div>`;
        }
        bodyEl.innerHTML = gaugeHtml + buildTabbedModal([
            { id: 'details',  label: 'Details',  content: detailsHtml },
            { id: 'benutzer', label: 'Benutzer', content: usersSection(d) },
        ]);

    } else if (dev.type === 'opnsense') {

        // Switches that list this OPNsense as their uplink
        const connectedSwitches = allDevices.filter(d => d.uplink === devId);

        // ── North: WireGuard peers ──────────────────────────────
        const wgPeers = d?.wireguard || [];
        let northNodes = '';
        if (wgPeers.length) {
            wgPeers.forEach(p => {
                const ep = (p.endpoint && p.endpoint !== '—') ? p.endpoint : '';
                northNodes += `<div class="topo-node ${p.status}" title="${ep}">
                    <span class="topo-dot ${p.status}"></span>
                    <span>${p.name}</span>
                    ${ep ? `<span class="topo-ep">${ep}</span>` : ''}
                </div>`;
            });
        } else {
            northNodes = `<span style="opacity:.4;font-size:.8rem">No WireGuard peers</span>`;
        }

        // ── Center: OPNsense metrics ────────────────────────────
        let centerMetrics = '';
        if (!d) {
            centerMetrics = `<div class="loading-hint">Details loading…</div>`;
        } else if (d.error && d.cpu === null) {
            centerMetrics = `<div class="api-error">Error: ${d.error}</div>`;
        } else {
            centerMetrics += infoRow('IP', dev.ip);
            if (d.uptime)  centerMetrics += infoRow('Uptime',   d.uptime);
            if (d.loadavg) centerMetrics += infoRow('Load Avg', d.loadavg);
            if (d.fw_states !== null && d.fw_states !== undefined) {
                const lim = d.fw_limit
                    ? ` / ${Number(d.fw_limit).toLocaleString('de')} max` : '';
                centerMetrics += infoRow('FW States',
                    `${Number(d.fw_states).toLocaleString('de')}${lim}`);
            }
            // Collapsible interface list
            if (d.interfaces?.length) {
                const upCount = d.interfaces.filter(i => i.status === 'up').length;
                const uid = 'topo-ifaces-' + devId;
                centerMetrics += `
                    <span class="topo-ifaces-toggle" onclick="
                        const b=document.getElementById('${uid}');
                        const a=this.querySelector('.arr');
                        b.style.display=b.style.display==='none'?'block':'none';
                        a.textContent=b.style.display==='none'?'▸':'▾';
                    ">
                        <span class="arr">▸</span>
                        Interfaces (${upCount}/${d.interfaces.length} up)
                    </span>
                    <div id="${uid}" style="display:none" class="topo-ifaces-body">
                        ${d.interfaces.map(i => interfaceRow(i)).join('')}
                    </div>`;
            }
            if (d.error) centerMetrics += `<div class="api-error" style="margin-top:.5rem">Partial error: ${d.error}</div>`;
        }

        // ── South: connected switches ───────────────────────────
        let southNodes = '';
        if (connectedSwitches.length) {
            connectedSwitches.forEach(sw => {
                const swSt = deviceStatus[sw.id] || 'pending';
                const swD  = detailsData[sw.id];
                const cpuTxt = swD?.cpu !== null && swD?.cpu !== undefined
                    ? `<span style="opacity:.5;font-size:.68rem">CPU ${swD.cpu}%</span>` : '';
                southNodes += `<div class="topo-node ${swSt}" title="${sw.ip}">
                    <span class="topo-dot ${swSt}"></span>
                    <span>${sw.name}</span>
                    ${cpuTxt}
                </div>`;
            });
        } else {
            southNodes = `<span style="opacity:.4;font-size:.8rem">No connected switches configured</span>`;
        }

        // ── Assemble topology layout ────────────────────────────
        const topoHtml = `
            <div class="topo-view">
                <div class="topo-layer">
                    <div class="topo-layer-label">▲ WireGuard Partners</div>
                    <div class="topo-nodes">${northNodes}</div>
                </div>
                <div class="topo-connector"><div class="topo-vline"></div></div>
                <div class="topo-center-card">
                    ${gaugeHtml}
                    <div style="margin-top:${gaugeHtml ? '.5rem' : '0'}">
                        ${centerMetrics}
                    </div>
                </div>
                <div class="topo-connector"><div class="topo-vline"></div></div>
                <div class="topo-layer">
                    <div class="topo-layer-label">▼ Connected Switches</div>
                    <div class="topo-nodes">${southNodes}</div>
                </div>
            </div>`;

        bodyEl.innerHTML = topoHtml;
    }

    document.getElementById('detailModal').classList.add('active');

    // Gauges nach DOM-Aufbau erzeugen
    if (d && d.cpu !== null && d.cpu !== undefined) {
        requestAnimationFrame(() => {
            _cpuChart = makeHalfGauge('mc-cpu', d.cpu, gaugeColor(d.cpu));
            _ramChart = makeHalfGauge('mc-ram', d.ram_used_pct ?? 0, gaugeColor(d.ram_used_pct ?? 0));
        });
    }
}

function closeModal() {
    document.getElementById('detailModal').classList.remove('active');
    destroyModalCharts();
}
window.onclick = e => { if (e.target.id === 'detailModal') closeModal(); };

// ── Initialisierung ────────────────────────────────────────────
initCards();

// ── Verbindungslinien & Partikel ───────────────────────────────
// Verbindungen: [Quell-ID, Ziel-ID]
const CONNECTIONS = [
    ['opn1',  'opn2'],
    ['opn2',  'pfs'],
    ['ben1',  'opn1'],
    ['ben2',  'opn2'],
    ['ben11', 'opn1'],
    ...config.devices.bottom_layer.flatMap(sw => [
        [sw.id, 'ben1'],
        [sw.id, 'ben2'],
    ]),
    ['bensp', 'opn1'],
    ['bensp', 'opn2'],
];

const connCanvas = document.createElement('canvas');
connCanvas.id = 'connCanvas';
connCanvas.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:5;';
document.body.appendChild(connCanvas);
const connCtx = connCanvas.getContext('2d');

let connParticles = [];

function resizeConnCanvas() {
    connCanvas.width  = window.innerWidth;
    connCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeConnCanvas);
resizeConnCanvas();

// Gibt Anfangs- und Endpunkt einer Verbindung zurück (Viewport-Koordinaten)
function getConnPts(id1, id2) {
    const c1 = document.getElementById('card-' + id1);
    const c2 = document.getElementById('card-' + id2);
    if (!c1 || !c2) return null;
    const r1 = c1.getBoundingClientRect();
    const r2 = c2.getBoundingClientRect();
    // Verbinde Unterkante des oberen mit Oberkante des unteren Elements
    const topIsA = r1.top <= r2.top;
    const rT = topIsA ? r1 : r2;
    const rB = topIsA ? r2 : r1;
    return {
        x1: rT.left + rT.width  / 2,
        y1: rT.bottom,
        x2: rB.left + rB.width  / 2,
        y2: rB.top,
    };
}

// Kubischer Bezier-Punkt für Partikel
function bezierPoint(t, x1, y1, cpx1, cpy1, cpx2, cpy2, x2, y2) {
    const u = 1 - t;
    return {
        x: u*u*u*x1 + 3*u*u*t*cpx1 + 3*u*t*t*cpx2 + t*t*t*x2,
        y: u*u*u*y1 + 3*u*u*t*cpy1 + 3*u*t*t*cpy2 + t*t*t*y2,
    };
}

function animateConnections() {
    connCtx.clearRect(0, 0, connCanvas.width, connCanvas.height);

    CONNECTIONS.forEach(([id1, id2]) => {
        const pts = getConnPts(id1, id2);
        if (!pts) return;
        const { x1, y1, x2, y2 } = pts;
        const cpOff = Math.abs(y2 - y1) * 0.45;
        const cpx1 = x1, cpy1 = y1 + cpOff;
        const cpx2 = x2, cpy2 = y2 - cpOff;

        const st1 = deviceStatus[id1] || 'pending';
        const st2 = deviceStatus[id2] || 'pending';
        const isDown = st1 === 'down' || st2 === 'down';

        // Linie
        connCtx.beginPath();
        connCtx.moveTo(x1, y1);
        connCtx.bezierCurveTo(cpx1, cpy1, cpx2, cpy2, x2, y2);
        connCtx.strokeStyle = isDown ? 'rgba(239,68,68,.38)' : 'rgba(226,0,116,.20)';
        connCtx.lineWidth   = isDown ? 2.2 : 1.4;
        connCtx.stroke();

        // Gelegentlich Partikel erzeugen
        if (Math.random() < 0.018) {
            connParticles.push({
                id1, id2,
                cpx1, cpy1, cpx2, cpy2,
                progress: 0,
                speed: 0.004 + Math.random() * 0.007,
                color: isDown ? 'rgba(239,68,68,.85)' : 'rgba(226,0,116,.80)',
                size:  isDown ? 3.2 : 2.5,
            });
        }
    });

    // Partikel zeichnen
    for (let i = connParticles.length - 1; i >= 0; i--) {
        const p = connParticles[i];
        const pts = getConnPts(p.id1, p.id2);
        if (!pts) { connParticles.splice(i, 1); continue; }
        const { x1, y1, x2, y2 } = pts;
        const bp = bezierPoint(p.progress, x1, y1, p.cpx1, p.cpy1, p.cpx2, p.cpy2, x2, y2);
        connCtx.beginPath();
        connCtx.arc(bp.x, bp.y, p.size, 0, Math.PI * 2);
        connCtx.fillStyle = p.color;
        connCtx.fill();
        p.progress += p.speed;
        if (p.progress >= 1) connParticles.splice(i, 1);
    }

    requestAnimationFrame(animateConnections);
}

// Kurz warten bis die Karten gerendert sind
setTimeout(animateConnections, 400);
</script>
</body>
</html>
